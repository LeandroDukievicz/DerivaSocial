<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DerivaSocial</title>
<style>
:root{
  --bg-page:#010212; --bg-deep:#040d1e; --bg-card:#081A3A;
  --cyan:#00ffff; --cyan-bright:#6CF2FF; --magenta:#ff00cc; --pink:#FF4AC4;
  --purple:#cc00ff; --lilac:#b88cff; --teal:#006d77;
  --txt:#e6f6ff; --muted:#7f93b0; --faint:#4f5b66;
  --line:rgba(108,242,255,.14); --line2:rgba(108,242,255,.28);
  --ok:#34d399; --warn:#f59e0b;
  --grad:linear-gradient(135deg,var(--cyan),var(--magenta));
  --mono:ui-monospace,"Roboto Mono","Cascadia Code",Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(720px 420px at 12% -6%, rgba(0,255,255,.10), transparent 42%),
    radial-gradient(680px 460px at 108% 12%, rgba(255,0,204,.10), transparent 46%),
    radial-gradient(600px 500px at 50% 120%, rgba(204,0,255,.07), transparent 55%),
    var(--bg-page);
  color:var(--txt); font-family:var(--sans); font-size:15px; line-height:1.55;
  -webkit-font-smoothing:antialiased; user-select:none;
}
a{color:var(--cyan-bright);text-decoration:none}
.wrap{max-width:1080px;margin:0 auto;padding:26px 22px 70px}

/* Header */
.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px}
.logo{width:40px;height:40px;border-radius:11px;object-fit:cover;display:block;
  box-shadow:0 0 18px rgba(0,255,255,.30),0 0 26px rgba(255,0,204,.22)}
.brand h1{margin:0;font-size:1.28rem;letter-spacing:.3px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand p{margin:1px 0 0;font-size:.78rem;color:var(--muted);font-family:var(--mono)}
.spacer{flex:1}
.btn{cursor:pointer;font-family:var(--sans);font-weight:600;font-size:.84rem;color:var(--txt);
  background:rgba(8,26,58,.7);border:1px solid var(--line2);padding:9px 15px;border-radius:10px;transition:.18s}
.btn:hover{border-color:var(--cyan);box-shadow:0 0 16px rgba(0,255,255,.25);color:#fff}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.stat{position:relative;background:linear-gradient(180deg,rgba(8,26,58,.85),rgba(4,13,30,.85));
  border:1px solid var(--line);border-radius:15px;padding:16px 18px;overflow:hidden}
.stat::before{content:"";position:absolute;inset:0;background:radial-gradient(300px 80px at 100% 0,rgba(0,255,255,.10),transparent 60%);pointer-events:none}
.stat .n{font-family:var(--mono);font-size:2rem;font-weight:800;line-height:1;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat.novos .n{background:linear-gradient(135deg,var(--warn),var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat.pub .n{background:linear-gradient(135deg,var(--ok),var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat .l{margin-top:4px;font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-family:var(--mono)}

/* Section title */
.sec{display:flex;align-items:center;gap:10px;margin:6px 2px 12px}
.sec h2{margin:0;font-size:.82rem;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);font-family:var(--mono)}
.sec .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}

/* Post card */
.list{display:grid;gap:12px}
.card{position:relative;display:flex;flex-wrap:wrap;gap:14px;background:var(--bg-card);border:1px solid var(--line);
  border-radius:14px;padding:12px;overflow:hidden;transition:.18s}
.card:hover{border-color:var(--line2);box-shadow:0 0 0 1px rgba(0,255,255,.06),0 10px 34px rgba(0,0,0,.5),inset 0 0 26px rgba(0,255,255,.05)}
.card::after{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;
  background:linear-gradient(110deg,transparent,rgba(255,255,255,.10) 45%,transparent 60%);
  transform:skewX(-18deg);transition:.55s;opacity:0}
.card:hover::after{left:130%;opacity:1}
.thumb{width:120px;height:78px;flex:0 0 auto;border-radius:10px;object-fit:cover;background:var(--bg-deep);
  border:1px solid var(--line)}
.thumb.ph{display:grid;place-items:center;color:var(--faint);font-family:var(--mono);font-size:.7rem}
.info{flex:1 1 280px;min-width:0;display:flex;flex-direction:column;gap:6px}
.info .t{font-weight:700;font-size:.98rem;color:#eaffff;line-height:1.3}
.info .meta{font-size:.74rem;color:var(--muted);font-family:var(--mono);display:flex;gap:10px;flex-wrap:wrap}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.chip{font-family:var(--mono);font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:999px;
  border:1px solid var(--line2);color:var(--muted);display:inline-flex;align-items:center;gap:5px}
.chip .dot{width:6px;height:6px;border-radius:50%;background:var(--faint)}
.chip.pend .dot{background:var(--warn)}
.chip.ok{color:var(--ok);border-color:rgba(52,211,153,.4)} .chip.ok .dot{background:var(--ok)}
.status{align-self:flex-start;font-family:var(--mono);font-size:.68rem;font-weight:800;letter-spacing:.05em;
  padding:4px 10px;border-radius:999px;text-transform:uppercase}
.status.novo{color:#02121f;background:linear-gradient(135deg,var(--warn),var(--pink))}
.status.publicado{color:#02121f;background:linear-gradient(135deg,var(--ok),var(--cyan))}
.side{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:8px;margin-left:auto}
.actions{display:flex;flex-direction:column;gap:8px;align-items:stretch}
.thumb-panel{flex:1 0 100%;width:100%;max-width:100%;min-width:0;margin:8px 0 0;border-top:1px solid var(--line);padding-top:12px;position:relative;z-index:1}
.thumb-panel[hidden]{display:none}
.thumb-grid{display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:14px;align-items:start}
.thumb-field{display:grid;gap:7px}
.thumb-field label{font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.thumb-field textarea,.thumb-field select{width:100%;background:rgba(1,2,18,.62);border:1px solid var(--line2);
  color:var(--txt);border-radius:10px;padding:10px 12px;font:600 .92rem var(--sans);outline:none}
.thumb-field select option{color:#0a1220;background:#eef3f8}
.thumb-field select:disabled{opacity:.55}
.thumb-field textarea{min-height:72px;resize:vertical;line-height:1.35}
.thumb-field textarea:focus,.thumb-field select:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,255,255,.12)}
.suggestions{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}
.suggestion{font-family:var(--sans);font-size:.76rem;font-weight:700;color:var(--txt);background:rgba(0,255,255,.08);
  border:1px solid var(--line2);border-radius:999px;padding:6px 10px;cursor:pointer}
.suggestion:hover{border-color:var(--cyan);color:#fff}
.thumb-controls{display:grid;grid-template-columns:minmax(140px,220px) auto;gap:9px;margin-top:10px;align-items:end}
.thumb-result{min-height:146px;border:1px dashed var(--line2);border-radius:12px;display:grid;place-items:center;
  color:var(--muted);font-family:var(--mono);font-size:.72rem;text-align:center;padding:10px;background:rgba(1,2,18,.28)}
.thumb-result img{width:100%;border-radius:10px;border:1px solid var(--line);display:block}
.thumb-result .path{margin-top:8px;word-break:break-all;color:var(--muted);font-size:.66rem}
.thumb-result .btn{margin-top:8px}
.empty{text-align:center;color:var(--muted);padding:50px 0;font-family:var(--mono);font-size:.85rem}
.foot{margin-top:26px;text-align:center;color:var(--faint);font-size:.72rem;font-family:var(--mono)}
@media (max-width: 760px){
  .card{display:block}
  .thumb{float:left;margin:0 12px 8px 0}
  .side{align-items:flex-start;margin-top:10px}
  .actions{flex-direction:row;flex-wrap:wrap}
  .thumb-panel{margin-left:0;clear:both}
  .thumb-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <img class="logo" src="icon.png" alt="DerivaSocial">
    <div class="brand">
      <h1>DerivaSocial</h1>
      <p id="rssline">devsaderiva.com.br</p>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="li-conn" title="Conectar sua conta do LinkedIn">in · verificando…</button>
    <button class="btn" id="refresh">↻ Atualizar agora</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="s-total">–</div><div class="l">Posts</div></div>
    <div class="stat novos"><div class="n" id="s-novos">–</div><div class="l">A publicar</div></div>
    <div class="stat pub"><div class="n" id="s-pub">–</div><div class="l">Publicados</div></div>
  </div>

  <div class="sec"><h2>Posts do blog</h2><div class="rule"></div></div>
  <div class="list" id="list"><div class="empty">carregando…</div></div>

  <div class="foot">M1 · LinkedIn ativo · Instagram e Threads em breve</div>
</div>

<script>
const REDES = ["threads", "instagram", "linkedin"];
const fmtDate = (s) => { if (!s) return ""; const d = new Date(s); return isNaN(d) ? "" : d.toLocaleDateString("pt-BR", { day: "2-digit", month: "short", year: "numeric" }); };
const esc = (s) => (s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function card(p) {
  const thumb = p.image
    ? '<img class="thumb" src="' + esc(p.image) + '" alt="" loading="lazy">'
    : '<div class="thumb ph">sem imagem</div>';
  const thumbDisabled = p.image ? "" : ' disabled title="sem imagem no RSS"';
  const chips = REDES.map((r) => {
    const st = p.networks && p.networks[r];
    const ok = st && st.status === "published";
    return '<span class="chip ' + (ok ? "ok" : "pend") + '"><span class="dot"></span>' + r + "</span>";
  }).join("");
  return '<div class="card">' + thumb +
    '<div class="info">' +
      '<div class="t">' + esc(p.title) + "</div>" +
      '<div class="meta"><span>' + fmtDate(p.publishedAt || p.discoveredAt) + "</span>" + (p.category ? '<span>#' + esc(p.category) + "</span>" : "") + "</div>" +
      '<div class="chips">' + chips + "</div>" +
    "</div>" +
    '<div class="side">' +
      '<span class="status ' + p.status + '">' + p.status + "</span>" +
      '<div class="actions">' +
        '<button class="btn" data-thumb-open data-guid="' + esc(p.guid) + '"' + thumbDisabled + ">Thumbnail</button>" +
        '<button class="btn" data-pub-open data-guid="' + esc(p.guid) + '">Publicar</button>' +
      "</div>" +
    "</div>" +
    '<div class="thumb-panel" data-thumb-panel data-guid="' + esc(p.guid) + '" hidden></div>' +
    '<div class="thumb-panel" data-pub-panel data-guid="' + esc(p.guid) + '" hidden></div>' +
  "</div>";
}

let POSTS = {};

async function render() {
  const [posts, stats] = await Promise.all([window.api.getPosts(), window.api.getStats()]);
  POSTS = Object.fromEntries(posts.map((p) => [p.guid, p]));
  document.getElementById("s-total").textContent = stats.total;
  document.getElementById("s-novos").textContent = stats.novos;
  document.getElementById("s-pub").textContent = stats.publicados;
  const list = document.getElementById("list");
  list.innerHTML = posts.length ? posts.map(card).join("") : '<div class="empty">nenhum post ainda</div>';
}

// ---- LinkedIn: conexão ----
async function refreshLinkedinButton() {
  const btn = document.getElementById("li-conn");
  try {
    const st = await window.api.linkedinStatus();
    if (!st.configured) { btn.textContent = "in · não configurado"; btn.disabled = true; btn.title = "Coloque Client ID/Secret no keys.txt"; }
    else if (st.connected) { btn.textContent = "in ✔ " + (st.name || "conectado"); btn.title = "Token válido até " + (st.expiresAt ? new Date(st.expiresAt).toLocaleDateString("pt-BR") : "?") + " — clique para reconectar"; }
    else { btn.textContent = st.expired ? "in ⚠ reconectar" : "in 🔗 Conectar LinkedIn"; btn.title = "Abre o navegador para autorizar"; }
  } catch (e) {
    btn.textContent = "in · erro";
    btn.title = e.message || String(e);
  }
}

document.getElementById("li-conn").addEventListener("click", async (e) => {
  const btn = e.target;
  btn.disabled = true; btn.textContent = "in … autorize no navegador";
  try { await window.api.linkedinConnect(); }
  catch (err) { alert("LinkedIn: " + (err.message || err)); }
  finally { btn.disabled = false; await refreshLinkedinButton(); }
});

// ---- Publicação ----
function defaultCopy(p) {
  const sum = (p.summary || "").trim();
  const tag = p.category ? " #" + p.category.replace(/\s+/g, "") : "";
  return p.title + "\n\n" + (sum ? sum + "\n\n" : "") + "Leia no blog 👇\n" + p.url + "\n\n#DevsADeriva" + tag;
}

const PUB_NETS = [
  { id: "linkedin", label: "LinkedIn" },
  { id: "instagram", label: "Instagram" },
  { id: "threads", label: "Threads (em breve)", off: true },
];

function pubPanelHtml(p) {
  const isPub = (id) => p.networks && p.networks[id] && p.networks[id].status === "published";
  const firstAvail = PUB_NETS.find((n) => !n.off && !isPub(n.id));
  const allDone = !firstAvail;

  const opts = PUB_NETS.map((n) => {
    const done = isPub(n.id);
    const sel = (firstAvail ? n.id === firstAvail.id : n === PUB_NETS[0]) ? " selected" : "";
    const dis = !allDone && (n.off || done) ? " disabled" : ""; // com select desabilitado, options ficam legíveis
    return '<option value="' + n.id + '"' + dis + sel + ">" + n.label + (done ? " ✓ publicado" : "") + "</option>";
  }).join("");

  const doneList = PUB_NETS.filter((n) => isPub(n.id)).map((n) => {
    const info = p.networks[n.id];
    return "✅ " + n.label + (info.url ? '<div class="path">' + esc(info.url) + "</div>" : "");
  }).join("<br>");

  return '<div class="thumb-grid">' +
    '<div>' +
      '<div class="thumb-field">' +
        '<label>Texto da publicação (edite à vontade)</label>' +
        '<textarea data-pub-text maxlength="2900" style="min-height:120px">' + esc(defaultCopy(p)) + "</textarea>" +
      "</div>" +
      '<div class="thumb-controls">' +
        '<div class="thumb-field"><label>Rede</label>' +
          '<select data-pub-network' + (allDone ? " disabled" : "") + ">" + opts + "</select>" +
        "</div>" +
        '<button class="btn" data-publish-go type="button"' + (allDone ? " disabled" : "") + ">🚀 Publicar</button>" +
      "</div>" +
    "</div>" +
    '<div class="thumb-result" data-pub-result>' +
      (doneList || "confira o texto e clique em Publicar") +
    "</div>" +
  "</div>";
}

async function doPublish(panel, btn) {
  const text = panel.querySelector("[data-pub-text]").value.trim();
  const network = panel.querySelector("[data-pub-network]").value;
  const result = panel.querySelector("[data-pub-result]");
  if (!text) { result.textContent = "o texto não pode ficar vazio"; return; }

  if (network === "linkedin") {
    const st = await window.api.linkedinStatus();
    if (!st.connected) { result.innerHTML = "⚠ conecte o LinkedIn primeiro (botão no topo)"; return; }
  }
  if (network === "instagram") {
    const st = await window.api.instagramStatus();
    if (!st.configured) { result.innerHTML = "⚠ Instagram sem credenciais (keys.txt)"; return; }
  }

  btn.disabled = true;
  result.textContent = "publicando…";
  try {
    const out = await window.api.publish({ guid: panel.dataset.guid, network, text });
    result.innerHTML = "✅ publicado!" + (out.url ? '<div class="path">' + esc(out.url) + "</div>" : "");
    await render();
    // reabre o painel do mesmo post pra manter o feedback visível
    const again = document.querySelector('[data-pub-panel][data-guid="' + CSS.escape(panel.dataset.guid) + '"]');
    if (again) {
      again.hidden = false;
      again.dataset.loaded = "1";
      again.innerHTML = pubPanelHtml(POSTS[panel.dataset.guid]);
    }
  } catch (err) {
    result.textContent = "❌ erro: " + (err.message || String(err));
    btn.disabled = false;
  }
}

document.getElementById("refresh").addEventListener("click", async (e) => {
  const b = e.target;
  b.disabled = true; b.textContent = "↻ atualizando…";
  try { await window.api.refresh(); await render(); }
  finally { b.disabled = false; b.textContent = "↻ Atualizar agora"; }
});

document.getElementById("list").addEventListener("click", async (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;

  if (btn.dataset.thumbOpen !== undefined) {
    const panel = findPanel(btn.dataset.guid);
    if (!panel) return;
    panel.hidden = !panel.hidden;
    if (!panel.hidden && !panel.dataset.loaded) await loadThumbnailPanel(panel, btn.dataset.guid);
    return;
  }

  if (btn.dataset.pubOpen !== undefined) {
    const panel = [...document.querySelectorAll("[data-pub-panel]")].find((el) => el.dataset.guid === btn.dataset.guid);
    if (!panel) return;
    panel.hidden = !panel.hidden;
    if (!panel.hidden) panel.innerHTML = pubPanelHtml(POSTS[btn.dataset.guid]);
    return;
  }

  if (btn.dataset.publishGo !== undefined) {
    const panel = btn.closest("[data-pub-panel]");
    if (panel) await doPublish(panel, btn);
    return;
  }

  if (btn.dataset.suggestion !== undefined) {
    const panel = btn.closest(".thumb-panel");
    const field = panel && panel.querySelector("[data-thumb-text]");
    if (field) field.value = btn.textContent.trim();
    return;
  }

  if (btn.dataset.generateThumb !== undefined) {
    const panel = btn.closest(".thumb-panel");
    if (panel) await generateThumbnail(panel, btn);
    return;
  }

  if (btn.dataset.showThumb !== undefined) {
    const result = btn.closest(".thumb-result");
    if (result && result.dataset.path) await window.api.showThumbnail(result.dataset.path);
  }
});

function findPanel(guid) {
  return [...document.querySelectorAll("[data-thumb-panel]")].find((el) => el.dataset.guid === guid);
}

async function loadThumbnailPanel(panel, guid) {
  panel.innerHTML = '<div class="thumb-result">carregando sugestões...</div>';
  try {
    const suggestions = await window.api.suggestThumbnailTexts(guid);
    panel.dataset.loaded = "1";
    panel.innerHTML = thumbnailPanelHtml(suggestions);
  } catch (err) {
    panel.innerHTML = '<div class="thumb-result">erro ao carregar sugestões: ' + esc(err.message || String(err)) + "</div>";
  }
}

function thumbnailPanelHtml(suggestions) {
  const first = suggestions[0] || "";
  const buttons = suggestions.map((s) => '<button class="suggestion" data-suggestion type="button">' + esc(s) + "</button>").join("");
  return '<div class="thumb-grid">' +
    '<div>' +
      '<div class="thumb-field">' +
        '<label>Texto chamativo</label>' +
        '<textarea data-thumb-text maxlength="70">' + esc(first) + "</textarea>" +
      "</div>" +
      '<div class="suggestions">' + buttons + "</div>" +
      '<div class="thumb-controls">' +
        '<div class="thumb-field">' +
          '<label>Formato</label>' +
          '<select data-thumb-format>' +
            '<option value="og">1200x630 link/social</option>' +
            '<option value="square">1080x1080 feed</option>' +
            '<option value="story">1080x1920 story</option>' +
          "</select>" +
        "</div>" +
        '<button class="btn" data-generate-thumb type="button">Gerar thumbnail</button>' +
      "</div>" +
    "</div>" +
    '<div class="thumb-result" data-thumb-result>preview aparece aqui</div>' +
  "</div>";
}

async function generateThumbnail(panel, btn) {
  const text = panel.querySelector("[data-thumb-text]").value.trim();
  const format = panel.querySelector("[data-thumb-format]").value;
  const result = panel.querySelector("[data-thumb-result]");
  if (!text) {
    result.textContent = "informe um texto para gerar";
    return;
  }

  btn.disabled = true;
  result.textContent = "gerando imagem...";
  try {
    const out = await window.api.generateThumbnail({ guid: panel.dataset.guid, text, format });
    result.dataset.path = out.path;
    result.innerHTML = '<div><img src="' + out.dataUrl + '" alt="Thumbnail gerada">' +
      '<div class="path">' + esc(out.width + "x" + out.height + " · " + out.path) + "</div>" +
      '<button class="btn" data-show-thumb type="button">Mostrar arquivo</button></div>';
  } catch (err) {
    result.textContent = "erro ao gerar: " + (err.message || String(err));
  } finally {
    btn.disabled = false;
  }
}

render();
refreshLinkedinButton();
</script>
</body>
</html>
