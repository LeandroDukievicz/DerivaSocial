services:
  syndicator:
    build: .
    container_name: blog-syndicator
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # Sem "ports": nada é exposto. Todo tráfego é de saída.
    logging:
      driver: json-file
      options:
        max-size: "10m"   # cada arquivo de log no máximo 10MB
        max-file: "3"     # mantém no máximo 3 (rotaciona) => teto ~30MB
